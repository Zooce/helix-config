theme = "indomitable"

[editor]
cursorline = true
auto-completion = false
middle-click-paste = false
trim-trailing-whitespace = true

[editor.statusline]
right = ["diagnostics", "primary-selection-length", "selections", "register", "file-encoding", "file-type", "position"]

[editor.cursor-shape]
insert = "bar"
select = "underline"

[editor.lsp]
auto-signature-help = false

[editor.smart-tab]
enable = false

[keys.normal]
a = ["move_char_right", "insert_mode"] # because `a` in helix is gay

[keys.insert]
C-left = ["move_prev_word_end", "collapse_selection"]
C-right = ["move_next_word_start", "collapse_selection"]
